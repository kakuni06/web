<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-box position="-1 0.5 -3" rotation="0 0 0" color="#00CA00"></a-box>
      <a-box position="-1 1 -3" rotation="0 0 0" color="#00CA00"></a-box>
      <a-sphere position="0 2.5 -2" radius="0.2" color="#FF2900"></a-sphere>
      <a-sphere position="0 1 -2.3" radius="0.25" color="#FF2900"></a-sphere>
      <a-cylinder position="0 2 -3" rotation="50 0 0" radius="1" height="1.25" color="#FFC65D"></a-cylinder>
      <a-plane position="0 1 -4" rotation="45 0 0" width="0.5" height="7" color="#7BC8A4"></a-plane>
      <a-sky color="#00E5FF"></a-sky>
    </a-scene>
